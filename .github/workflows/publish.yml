name: publish-gh-pages

on:
  push:
    branches: main
  workflow_dispatch:

# Allow the workflow to deploy to GitHub Pages via the built-in token.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v7

    - name: Prepare _site
      run: |
        echo generate main html page in _site/
        mkdir _site
        cd .tools/schedulegen
        npm install --no-optional
        cd ../..
        cd .tools/webgen
        npm install --no-optional
        cd ../..

    - name: Generate main page
      env:
          GDOC_CREDENTIALS: ${{ secrets.GDOC_CREDENTIALS }}
          SPREADSHEET_ID: ${{ secrets.SPREADSHEET_ID }}
      run: |
        echo $GDOC_CREDENTIALS > credentials.json
        SPREADSHEET_ID="$SPREADSHEET_ID" SEMESTER=f2026 node .tools/schedulegen/index.js > schedule.md
        node .tools/webgen/index.js README.md schedule.md > _site/index.html
        cp *.svg _site/
        cp *.png _site/
        mkdir _site/assignments
        cp assignments/*.html _site/assignments/
        rm credentials.json

    - name: Upload Pages artifact
      uses: actions/upload-pages-artifact@v5

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5
